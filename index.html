<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Visual Board - Pro Edition</title>
    <style>
        :root { 
            --bg: #111827; --primary: #ff007a; --folder: #00d2ff; --text: #ffffff; 
            --danger: #ff4b2b; --success: #00ff87; --locked: #bd00ff; --card-bg: #ffffff;
        }
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        .routine-section { background: #1e293b; padding: 20px; border-radius: 20px; margin-bottom: 20px; border-top: 6px solid var(--primary); box-shadow: 0 0 20px rgba(255, 0, 122, 0.3); }
        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-top: 10px; }
        
        /* Fixed Slot Sizing */
        .slot { aspect-ratio: 1 / 1; border: 2px dashed #4a5568; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: #2d3748; overflow: hidden; position: relative; }
        .slot.filled { border: 3px solid var(--primary); background: var(--card-bg); }
        
        .category-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .nav-wrapper { display: flex; align-items: center; gap: 10px; }
        .category-nav, .sub-nav { display: flex; gap: 8px; overflow-x: auto; flex-grow: 1; padding-bottom: 5px; scrollbar-width: none; }
        
        .folder-btn { background: #334155; color: white; padding: 10px 18px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; white-space: nowrap; border-bottom: 4px solid rgba(0,0,0,0.3); }
        .folder-btn.active { background: var(--folder) !important; color: #000; border-bottom: none; transform: translateY(2px); }
        .folder-btn.is-locked-tab::after { content: ' 🔒'; font-size: 0.7rem; }

        .sub-btn { background: #475569; color: white; padding: 6px 14px; border-radius: 15px; border: none; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .sub-btn.active { background: var(--success); color: #000; }

        /* Library Grid - Fixed Image Visibility */
        .library-section { background: #0f172a; padding: 15px; border-radius: 20px; border: 2px solid #334155; }
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        
        .lib-card { background: var(--card-bg); border-radius: 12px; padding: 8px; text-align: center; cursor: pointer; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; box-shadow: 4px 4px 0px var(--folder); }
        .lib-card img, .pec-card img { width: 100%; height: 70%; object-fit: contain; } /* This ensures images aren't giant/stretched */
        
        .card-label { font-size: 0.7rem; font-weight: 800; color: #000; line-height: 1.1; margin-top: 4px; }
        .add-btn { background: var(--success); color: white; border-radius: 12px; border: none; width: 42px; height: 42px; font-size: 1.5rem; cursor: pointer; }
        .btn-send { width: 100%; background: linear-gradient(45deg, var(--primary), #8a2be2); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 0 #6d0043; }
        .is-blurred { filter: blur(10px); opacity: 0.5; }

        @media (max-width: 600px) { .grid-6 { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div class="routine-section">
        <h2 style="font-size: 0.8rem; color: #94a3b8; margin: 0 0 10px 0;">⏳ VISUAL SEQUENCE</h2>
        <div id="routineGrid" class="grid-6"></div>
        <button class="btn-send" onclick="sendToPartner()">🔗 CREATE WHATSAPP LINK</button>
    </div>

    <div class="category-container">
        <div class="nav-wrapper">
            <div id="categoryNav" class="category-nav"></div>
            <button class="add-btn" onclick="addMainFolder()">+</button>
        </div>
        <div class="nav-wrapper">
            <div id="subNav" class="sub-nav"></div>
            <button class="add-btn" style="background:var(--folder); font-size: 1rem;" onclick="addSubFolder()">+ Sub</button>
        </div>
    </div>

    <div class="library-section">
        <div id="libraryGrid" class="library-grid"></div>
    </div>
</div>

<script>
    const PERMANENT = {
        "Private": { "Main": [{id:"p1", label:"Secret", img:"https://imglink.cc/cdn/tfrJszlzWu.jpg", p:true}], "Love": [{id:"l1", label:"Love U", img:"https://imglink.cc/cdn/tfrJszlzWu.jpg", p:true}] },
        "Time": { "Main": [{id:"t1", label:"Wait", img:"https://cdn-icons-png.flaticon.com/512/2997/2997985.png"}], "Emergency": [{id:"e1", label:"HELP", img:"https://cdn-icons-png.flaticon.com/512/1182/1182740.png"}] }
    };

    let db = JSON.parse(localStorage.getItem('pecs_v5_pro')) || PERMANENT;
    let state = { routine: Array(6).fill(null), cat: "Time", sub: "Main", unlocked: false };

    function save() { localStorage.setItem('pecs_v5_pro', JSON.stringify(db)); }

    function render() {
        // Routine Slots
        document.getElementById('routineGrid').innerHTML = state.routine.map((item, i) => {
            if(!item) return `<div class="slot"></div>`;
            const isBlur = item.p && !state.unlocked;
            return `<div class="slot filled" onclick="removeFromSlot(${i})">
                <div class="pec-card ${isBlur ? 'is-blurred' : ''}"><img src="${item.img}"><div class="card-label">${item.label}</div></div>
            </div>`;
        }).join('');

        // Main Nav
        document.getElementById('categoryNav').innerHTML = Object.keys(db).map(c => `
            <button class="folder-btn ${state.cat === c ? 'active' : ''} ${c.toLowerCase().includes('private') ? 'is-locked-tab' : ''}" onclick="setCat('${c}')">${c}</button>
        `).join('');

        // Sub Nav
        const subs = Object.keys(db[state.cat] || {});
        document.getElementById('subNav').innerHTML = subs.map(s => `
            <button class="sub-btn ${state.sub === s ? 'active' : ''}" onclick="setSub('${s}')">${s}</button>
        `).join('');

        // Cards
        const grid = document.getElementById('libraryGrid');
        if(state.cat.toLowerCase().includes('private') && !state.unlocked) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;" onclick="unlock()">🔒 Tap to Unlock</div>`;
        } else {
            let html = (db[state.cat][state.sub] || []).map(item => `
                <div class="lib-card" onclick='addToSlot(${JSON.stringify(item)})'>
                    <img src="${item.img}"><div class="card-label">${item.label}</div>
                </div>`).join('');
            html += `<div class="lib-card" style="background:#334155; border:2px dashed #4a5568;" onclick="addCard()">
                <span style="font-size:2rem; color:var(--success)">+</span><div class="card-label" style="color:white">Add Card</div>
            </div>`;
            grid.innerHTML = html;
        }
    }

    function setCat(c) { state.cat = c; state.sub = Object.keys(db[c])[0]; render(); }
    function setSub(s) { state.sub = s; render(); }
    function unlock() { if(prompt("Passcode:") === "6969") { state.unlocked = true; render(); } }
    function addToSlot(item) { const i = state.routine.indexOf(null); if(i !== -1) { state.routine[i] = item; render(); } }
    function removeFromSlot(i) { state.routine[i] = null; render(); }

    function addMainFolder() {
        const n = prompt("New Folder Name:");
        if(n) { db[n] = { "Main": [] }; state.cat = n; state.sub = "Main"; save(); render(); }
    }
    function addSubFolder() {
        const n = prompt("New Sub-Folder Name:");
        if(n) { db[state.cat][n] = []; state.sub = n; save(); render(); }
    }
    function addCard() {
        const l = prompt("Label:");
        const i = prompt("Image URL:");
        if(l && i) {
            db[state.cat][state.sub].push({ id: Date.now(), label: l, img: i, p: state.cat.toLowerCase().includes('private') });
            save(); render();
        }
    }
    function sendToPartner() {
        const link = window.location.href.split('?')[0] + "?data=" + btoa(JSON.stringify(state.routine));
        navigator.clipboard.writeText(link);
        alert("Link Copied!");
    }

    window.onload = render;
</script>
</body>
</html>
