<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Visual Board</title>
    <style>
        /* Sleek Reset */
        :root { --bg: #f0f4f8; --primary: #2563eb; --card: #ffffff; --text: #1e293b; --folder: #475569; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        
        body { background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }

        /* The Board Area */
        .board { background: var(--card); padding: 15px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; border-bottom: 6px solid #cbd5e1; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .slot { aspect-ratio: 1/1; border: 2px dashed #e2e8f0; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: #fafafa; overflow: hidden; position: relative; }
        .slot.filled { border: 2px solid var(--primary); background: white; box-shadow: 0 4px 0 #dbeafe; }

        /* Cards Styling */
        .card { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 5px; cursor: pointer; }
        .card img { width: 45%; height: auto; margin-bottom: 5px; pointer-events: none; }
        .card-text { font-size: 0.7rem; font-weight: 800; line-height: 1.1; color: var(--text); text-transform: uppercase; }

        /* Buttons */
        .btn-main { width: 100%; background: var(--primary); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: bold; font-size: 1.1rem; margin-top: 15px; cursor: pointer; box-shadow: 0 5px 0 #1e40af; transition: 0.1s; }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 2px 0 #1e40af; }
        
        /* Library Section */
        .nav { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; width: 100%; scrollbar-width: none; }
        .tab { background: var(--folder); color: white; padding: 10px 20px; border-radius: 12px; border: none; font-weight: bold; white-space: nowrap; }
        .tab.active { background: #000; scale: 1.05; }
        
        .bank { background: #cbd5e1; padding: 12px; border-radius: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; min-height: 200px; }
        .lib-wrapper { position: relative; aspect-ratio: 1/1; }
        .lib-item { background: white; border-radius: 15px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        
        .del { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; width: 24px; height: 24px; border: 2px solid white; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .add-new { background: #94a3b8; border: 3px dashed #64748b; font-size: 2rem; color: white; }

        @media (min-width: 400px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div class="board">
        <h2 style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 5px;">SEQUENCE</h2>
        <div id="grid" class="grid"></div>
        <button class="btn-main" onclick="whatsapp()">📲 SEND TO PARTNER</button>
        <p onclick="clearAll()" style="text-align:center; font-size:0.7rem; color:gray; text-decoration:underline; margin-top:15px; cursor:pointer;">Clear All</p>
    </div>

    <div id="nav" class="nav"></div>
    <div id="bank" class="bank"></div>
</div>

<script>
    const DEFAULTS = {
        "Needs": [
            { label: 'Wait', img: 'https://cdn-icons-png.flaticon.com/512/2997/2997985.png' },
            { label: 'Help', img: 'https://cdn-icons-png.flaticon.com/512/1182/1182740.png' },
            { label: 'Toilet', img: 'https://cdn-icons-png.flaticon.com/512/3014/3014814.png' }
        ],
        "Social": [
            { label: 'I Love You', img: 'https://cdn-icons-png.flaticon.com/512/833/833472.png' },
            { label: 'Yes', img: 'https://cdn-icons-png.flaticon.com/512/5290/5290058.png' },
            { label: 'No', img: 'https://cdn-icons-png.flaticon.com/512/5290/5290077.png' }
        ]
    };

    let db = JSON.parse(localStorage.getItem('board_db')) || DEFAULTS;
    let routine = Array(6).fill(null);
    let currentCat = Object.keys(db)[0];

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const shared = urlParams.get('v');
        if (shared) {
            try {
                const data = JSON.parse(decodeURIComponent(escape(atob(shared))));
                routine = data.r;
                db = data.d;
                localStorage.setItem('board_db', JSON.stringify(db));
                window.history.replaceState({}, '', window.location.pathname);
            } catch(e) {}
        }
        render();
    };

    function render() {
        document.getElementById('grid').innerHTML = routine.map((item, i) => `
            <div class="slot ${item ? 'filled' : ''}" onclick="remove(${i})">
                ${item ? `<div class="card"><img src="${item.img}"><div class="card-text">${item.label}</div></div>` : ''}
            </div>
        `).join('');

        document.getElementById('nav').innerHTML = Object.keys(db).map(c => `
            <button class="tab ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}')">${c}</button>
        `).join('');

        let html = db[currentCat].map((item, idx) => `
            <div class="lib-wrapper">
                <div class="del" onclick="del(${idx})">×</div>
                <div class="lib-item" onclick='add(${JSON.stringify(item)})'>
                    <div class="card"><img src="${item.img}"><div class="card-text">${item.label}</div></div>
                </div>
            </div>
        `).join('');
        html += `<div class="lib-wrapper lib-item add-new" onclick="addNew()">+</div>`;
        document.getElementById('bank').innerHTML = html;
    }

    function setCat(c) { currentCat = c; render(); }
    function add(item) { 
        const idx = routine.indexOf(null);
        if (idx !== -1) { routine[idx] = item; render(); }
    }
    function remove(i) { routine[i] = null; render(); }
    function clearAll() { routine = Array(6).fill(null); render(); }
    function del(idx) { if(confirm("Delete?")) { db[currentCat].splice(idx, 1); save(); render(); } }
    function addNew() {
        const l = prompt("Label:");
        const i = prompt("Image URL:");
        if(l && i) { db[currentCat].push({label: l, img: i}); save(); render(); }
    }
    function save() { localStorage.setItem('board_db', JSON.stringify(db)); }

    function whatsapp() {
        const shareData = btoa(unescape(encodeURIComponent(JSON.stringify({ r: routine, d: db }))));
        const url = window.location.href.split('?')[0] + "?v=" + shareData;
        const temp = document.createElement("textarea");
        temp.value = url; document.body.appendChild(temp); temp.select();
        document.execCommand("copy"); document.body.removeChild(temp);
        alert("Link Copied! Paste it into WhatsApp.");
    }
</script>
</body>
</html>
