<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Board</title>
    <style>
        :root { --bg: #f1f5f9; --primary: #2563eb; --card: #ffffff; --text: #0f172a; --folder: #475569; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            padding: 15px;
            display: block; /* Fixed from flex to prevent forced centering */
        }

        .container { 
            width: 100%; 
            max-width: 800px; 
            margin: 0 auto; 
        }

        /* Top Active Board */
        .board-section { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
            border-top: 6px solid var(--primary);
        }

        .grid-6 { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            margin: 15px 0;
        }

        .slot { 
            aspect-ratio: 1/1; 
            border: 2px dashed #cbd5e1; 
            border-radius: 15px; 
            background: #f8fafc; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            text-align: center;
        }

        .slot.filled { border: 2px solid var(--primary); background: white; }

        .slot img { width: 50%; height: auto; margin-bottom: 5px; }
        .slot span { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; padding: 0 4px; }

        /* Shared Buttons */
        .btn-send { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            padding: 18px; 
            border-radius: 15px; 
            border: none; 
            font-weight: bold; 
            font-size: 1.1rem; 
            cursor: pointer;
            box-shadow: 0 4px 0 #1e40af;
        }

        /* Navigation Folders */
        .folder-row { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            padding-bottom: 12px; 
            scrollbar-width: none; 
        }

        .folder-btn { 
            background: var(--folder); 
            color: white; 
            padding: 12px 20px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            white-space: nowrap;
            cursor: pointer;
        }

        .folder-btn.active { background: #000; scale: 1.05; }

        /* Card Library */
        .library-grid { 
            background: #e2e8f0; 
            padding: 15px; 
            border-radius: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); 
            gap: 12px; 
        }

        .lib-card-box { position: relative; aspect-ratio: 1/1; }

        .lib-card { 
            background: white; 
            border-radius: 15px; 
            height: 100%; 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            text-align: center;
            padding: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .lib-card img { width: 45%; height: auto; margin-bottom: 5px; }
        .lib-card span { font-size: 0.7rem; font-weight: 800; color: var(--text); }

        .delete-icon { 
            position: absolute; 
            top: -5px; 
            right: -5px; 
            background: #ef4444; 
            color: white; 
            border-radius: 50%; 
            width: 24px; 
            height: 24px; 
            border: 2px solid white; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            z-index: 10;
            cursor: pointer;
        }

        .add-new-btn { 
            background: #94a3b8; 
            border: 3px dashed #64748b; 
            font-size: 2.5rem; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 15px;
            cursor: pointer;
        }

        @media (min-width: 600px) { 
            .grid-6 { grid-template-columns: repeat(6, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="board-section">
        <div id="routineDisplay" class="grid-6"></div>
        <button class="btn-send" onclick="generateLink()">📲 SHARE TO WHATSAPP</button>
        <p onclick="clearRoutine()" style="text-align:center; font-size:0.75rem; color:gray; text-decoration:underline; margin-top:15px; cursor:pointer;">Clear Sequence</p>
    </div>

    <div id="folderNav" class="folder-row"></div>
    <div id="cardLibrary" class="library-grid"></div>
</div>

<script>
    const INITIAL_DATA = {
        "Essentials": [
            { label: 'Wait', img: 'https://cdn-icons-png.flaticon.com/512/2997/2997985.png' },
            { label: 'Help', img: 'https://cdn-icons-png.flaticon.com/512/1182/1182740.png' },
            { label: 'Toilet', img: 'https://cdn-icons-png.flaticon.com/512/3014/3014814.png' }
        ],
        "Feelings": [
            { label: 'I Love You', img: 'https://cdn-icons-png.flaticon.com/512/833/833472.png' },
            { label: 'Yes', img: 'https://cdn-icons-png.flaticon.com/512/5290/5290058.png' },
            { label: 'No', img: 'https://cdn-icons-png.flaticon.com/512/5290/5290077.png' }
        ]
    };

    let database = JSON.parse(localStorage.getItem('my_board_v3')) || INITIAL_DATA;
    let activeRoutine = Array(6).fill(null);
    let activeCat = Object.keys(database)[0];

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const sharedData = urlParams.get('v');
        if (sharedData) {
            try {
                const parsed = JSON.parse(decodeURIComponent(escape(atob(sharedData))));
                activeRoutine = parsed.r;
                database = parsed.d;
                localStorage.setItem('my_board_v3', JSON.stringify(database));
                window.history.replaceState({}, '', window.location.pathname);
            } catch(e) { console.error("Load Error"); }
        }
        renderApp();
    };

    function renderApp() {
        // Render Top Board
        document.getElementById('routineDisplay').innerHTML = activeRoutine.map((item, i) => `
            <div class="slot ${item ? 'filled' : ''}" onclick="removeFromRoutine(${i})">
                ${item ? `<img src="${item.img}"><span>${item.label}</span>` : ''}
            </div>
        `).join('');

        // Render Folder Tabs
        document.getElementById('folderNav').innerHTML = Object.keys(database).map(c => `
            <button class="folder-btn ${activeCat === c ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>
        `).join('');

        // Render Library
        let libHtml = database[activeCat].map((item, idx) => `
            <div class="lib-card-box">
                <div class="delete-icon" onclick="deleteCard(${idx})">×</div>
                <div class="lib-card" onclick='addToRoutine(${JSON.stringify(item)})'>
                    <img src="${item.img}">
                    <span>${item.label}</span>
                </div>
            </div>
        `).join('');
        libHtml += `<div class="lib-card-box add-new-btn" onclick="addNewCard()">+</div>`;
        document.getElementById('cardLibrary').innerHTML = libHtml;
    }

    function setCategory(c) { activeCat = c; renderApp(); }
    
    function addToRoutine(item) { 
        const emptyIndex = activeRoutine.indexOf(null);
        if (emptyIndex !== -1) { activeRoutine[emptyIndex] = item; renderApp(); }
    }

    function removeFromRoutine(i) { activeRoutine[i] = null; renderApp(); }
    
    function clearRoutine() { activeRoutine = Array(6).fill(null); renderApp(); }

    function deleteCard(idx) {
        if(confirm("Delete this card?")) {
            database[activeCat].splice(idx, 1);
            saveData();
            renderApp();
        }
    }

    function addNewCard() {
        const l = prompt("Name of card:");
        const i = prompt("Image link (URL):");
        if(l && i) {
            database[activeCat].push({label: l, img: i});
            saveData();
            renderApp();
        }
    }

    function saveData() { localStorage.setItem('my_board_v3', JSON.stringify(database)); }

    function generateLink() {
        const payload = btoa(unescape(encodeURIComponent(JSON.stringify({ r: activeRoutine, d: database }))));
        const finalUrl = window.location.href.split('?')[0] + "?v=" + payload;
        const dummy = document.createElement("textarea");
        document.body.appendChild(dummy);
        dummy.value = finalUrl;
        dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);
        alert("✅ Link copied to clipboard! Paste it into WhatsApp.");
    }
</script>

</body>
</html>
