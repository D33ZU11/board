<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Visual Board - Pro Edition</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --panel: #1e293b; 
            --primary: #00d2ff; 
            --accent: #ff007f; 
            --text: #f8fafc; 
            --danger: #ff4757; 
            --success: #32ff7e; 
            --locked: #7d5fff; 
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px; 
        }

        .container { max-width: 800px; margin: 0 auto; }

        .routine-section { 
            background: var(--panel); 
            padding: 20px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { font-size: 1.1rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }

        .grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-top: 15px; }

        .slot { 
            aspect-ratio: 1 / 1; 
            border: 2px dashed #475569; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #0f172a; 
            overflow: hidden; 
            position: relative; 
        }

        .slot.filled { border-style: solid; border-color: var(--primary); background: white; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        .is-blurred { filter: blur(15px); opacity: 0.4; }
        .lock-overlay { position: absolute; font-size: 1.8rem; z-index: 5; color: white; }

        .pec-card { 
            width: 100%; height: 100%; padding: 8px; 
            text-align: center; cursor: pointer; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between; 
        }

        .pec-card img { width: 100%; height: 70%; object-fit: contain; border-radius: 8px; }
        .card-label { font-size: 0.75rem; font-weight: 900; color: #1e293b; text-transform: uppercase; }

        .btn-send { 
            width: 100%; background: linear-gradient(90deg, var(--primary), #0072ff); color: white; 
            padding: 18px; border-radius: 16px; border: none; 
            font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 15px; 
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4); text-transform: uppercase;
        }

        .category-container { display:flex; align-items:center; gap:15px; margin-bottom: 20px; }
        .category-nav { display: flex; gap: 12px; overflow-x: auto; flex-grow: 1; padding: 10px 0; scrollbar-width: none; }
        .category-nav::-webkit-scrollbar { display: none; }

        .folder-btn { 
            background: #334155; color: #94a3b8; 
            padding: 14px 24px; border-radius: 12px; 
            border: none; font-weight: 800; 
            cursor: pointer; white-space: nowrap; 
        }
        .folder-btn.active { background: var(--primary); color: #0f172a; box-shadow: 0 0 20px rgba(0, 210, 255, 0.5); }
        .folder-btn.is-locked-tab { background: #4b4b4b; color: var(--locked); }
        .folder-btn.is-locked-tab.active { background: var(--locked); color: white; }

        .add-folder-btn { 
            background: var(--success); color: #0f172a; 
            width: 50px; height: 50px; border-radius: 15px; 
            border: none; font-size: 2.2rem; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
        }

        .library-section { background: var(--panel); padding: 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; }

        .lib-card-wrapper { position: relative; aspect-ratio: 1/1; }
        .lib-card { 
            background: white; border-radius: 18px; padding: 12px; 
            text-align: center; cursor: pointer; height: 100%; 
            display: flex; flex-direction: column; justify-content: space-between; 
            align-items: center; 
        }

        .del-btn { 
            position: absolute; top: -5px; right: -5px; 
            background: var(--danger); color: white; 
            border-radius: 8px; width: 28px; height: 28px; 
            border: 2px solid var(--panel); font-size: 18px; font-weight: bold; 
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }

        .btn-del-folder { background: rgba(255, 71, 87, 0.1); border: 1px solid var(--danger); color: var(--danger); font-size: 0.8rem; padding: 8px 15px; border-radius: 10px; cursor: pointer; }

        .add-custom-btn { 
            background: rgba(255, 255, 255, 0.05); color: var(--primary); 
            border: 2px dashed var(--primary); border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; min-height: 110px; font-size: 2.5rem;
        }

        @media (max-width: 600px) { .grid-6 { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div class="routine-section">
        <h2>Visual Sequence</h2>
        <div id="routineGrid" class="grid-6"></div>
        <button class="btn-send" onclick="sendToPartner()">🚀 Create WhatsApp Link</button>
        <button onclick="clearRoutine()" style="background:none; border:none; color:#64748b; text-decoration:underline; font-size:0.85rem; margin-top:20px; width:100%; cursor:pointer;">Reset Board</button>
    </div>

    <div class="category-container">
        <div id="categoryNav" class="category-nav"></div>
        <button class="add-folder-btn" onclick="addNewCategory()">+</button>
    </div>

    <div class="library-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <span id="currentCatLabel" style="font-weight:900; font-size:1.2rem; color:var(--primary);">Library</span>
            <button id="delFolderBtn" class="btn-del-folder" onclick="deleteCurrentCategory()">Delete Folder</button>
        </div>
        <div id="libraryGrid" class="library-grid"></div>
    </div>
</div>

<script>
    // ************************************************************
    // START ADDING YOUR STUFF HERE (PERMANENT FOLDERS & CARDS)
    // ************************************************************
    const PERMANENT_LIBRARY = {
        "Private": [
            { id: "p1", label: 'Secret', img: 'https://imglink.cc/cdn/tfrJszlzWu.jpg', p: true }
        ],
        "Time": [
            { id: "t1", label: 'Wait', img: 'https://cdn-icons-png.flaticon.com/512/2997/2997985.png' }
        ],
        "Social": [
            { id: "s1", label: 'Help', img: 'https://cdn-icons-png.flaticon.com/512/1182/1182740.png' }
        ],
        "Love": [
            { id: "love1", label: 'love u', img: 'https://imglink.cc/cdn/tfrJszlzWu.jpg' }
        ]
    };
    // ************************************************************

    const PASSCODE = "6969";
    const SLOT_COUNT = 6;
    let savedDb = JSON.parse(localStorage.getItem('pecs_db_v4')) || {};
    let database = { ...PERMANENT_LIBRARY, ...savedDb };

    // Make sure permanent items are always there
    Object.keys(PERMANENT_LIBRARY).forEach(cat => {
        if (!database[cat]) database[cat] = PERMANENT_LIBRARY[cat];
        else {
            PERMANENT_LIBRARY[cat].forEach(pItem => {
                if (!database[cat].find(i => i.id === pItem.id)) database[cat].push(pItem);
            });
        }
    });

    let state = { 
        routine: Array(SLOT_COUNT).fill(null), 
        currentCategory: Object.keys(database)[0] || "Time",
        unlocked: false 
    };

    function saveDb() { localStorage.setItem('pecs_db_v4', JSON.stringify(database)); }
    function isLocked(name) { return (name.toLowerCase().includes("private") || name.toLowerCase().includes("adult")) && !state.unlocked; }
    function checkPass() { const entry = prompt("Passcode:"); if (entry === PASSCODE) { state.unlocked = true; render(); return true; } alert("Wrong."); return false; }

    function render() {
        const routineEl = document.getElementById('routineGrid');
        routineEl.innerHTML = state.routine.map((item, i) => {
            if (!item) return `<div class="slot"></div>`;
            const isPrivateCard = item.p === true && !state.unlocked;
            return `
            <div class="slot filled" onclick="${isPrivateCard ? 'checkPass()' : `removeFromSlot(${i})`}">
                ${isPrivateCard ? '<div class="lock-overlay">🔒</div>' : ''}
                <div class="pec-card ${isPrivateCard ? 'is-blurred' : ''}">
                    <img src="${item.img}">
                    <div class="card-label">${item.label}</div>
                </div>
            </div>`;
        }).join('');

        const navEl = document.getElementById('categoryNav');
        navEl.innerHTML = Object.keys(database).map(cat => {
            const locked = cat.toLowerCase().includes("private") || cat.toLowerCase().includes("adult");
            return `<button class="folder-btn ${state.currentCategory === cat ? 'active' : ''} ${locked ? 'is-locked-tab' : ''}" onclick="setCategory('${cat}')">${cat}${locked ? ' 🔒' : ''}</button>`;
        }).join('');

        const libEl = document.getElementById('libraryGrid');
        if (isLocked(state.currentCategory)) {
            libEl.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--locked); font-weight:900; cursor:pointer;" onclick="checkPass()">LOCKED - CLICK TO UNLOCK</div>`;
            return;
        }

        document.getElementById('currentCatLabel').innerText = state.currentCategory;
        let libHtml = (database[state.currentCategory] || []).map((item, index) => `
            <div class="lib-card-wrapper">
                <div class="del-btn" onclick="deleteFromLibrary(${index})">×</div>
                <div class="lib-card" onclick='addToFirstEmptySlot(${JSON.stringify(item)})'>
                    <img src="${item.img}">
                    <div class="card-label">${item.label}</div>
                </div>
            </div>
        `).join('');
        libHtml += `<div class="add-custom-btn" onclick="addLinkCard()">+</div>`;
        libEl.innerHTML = libHtml;
    }

    function setCategory(cat) { if (isLocked(cat)) { if (!checkPass()) return; } state.currentCategory = cat; render(); }
    function addNewCategory() { const name = prompt("Folder Name:"); if (name) { database[name] = []; state.currentCategory = name; saveDb(); render(); } }
    function deleteCurrentCategory() { if (confirm(`Delete ${state.currentCategory}?`)) { delete database[state.currentCategory]; state.currentCategory = Object.keys(database)[0]; saveDb(); render(); } }
    function addLinkCard() { const label = prompt("Name:"); const imgUrl = prompt("ImgLink URL:"); if (label && imgUrl) { const isP = state.currentCategory.toLowerCase().includes("private"); database[state.currentCategory].push({ id: "c_"+Date.now(), label, img: imgUrl, p: isP }); saveDb(); render(); } }
    function addToFirstEmptySlot(card) { const idx = state.routine.findIndex(s => s === null); if (idx !== -1) { state.routine[idx] = card; render(); } }
    function removeFromSlot(index) { state.routine[index] = null; render(); }
    function clearRoutine() { state.routine = Array(SLOT_COUNT).fill(null); render(); }
    function deleteFromLibrary(index) { if(confirm("Delete?")) { database[state.currentCategory].splice(index, 1); saveDb(); render(); } }
    
    function sendToPartner() { 
        const data = JSON.stringify({ r: state.routine, db: database });
        const encoded = btoa(unescape(encodeURIComponent(data)));
        const shareUrl = window.location.href.split('?')[0] + "?data=" + encoded;
        
        const el = document.createElement("textarea");
        el.value = shareUrl; document.body.appendChild(el);
        el.select(); document.execCommand("copy");
        document.body.removeChild(el);
        alert("Link copied to clipboard! Paste it into WhatsApp.");
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const sharedData = params.get('data');
        if (sharedData) {
            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(sharedData))));
                state.routine = decoded.r; database = decoded.db; saveDb();
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch(e) {}
        }
        render();
    };
</script>
</body>
</html>
