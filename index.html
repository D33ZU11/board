<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Visual Board Link-Share</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --primary: #2563eb;
            --folder: #64748b;
            --text: #1e293b;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }

        .container { max-width: 800px; margin: 0 auto; }

        .routine-section {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border-top: 6px solid var(--primary);
        }

        .grid-6 {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 12px;
            margin-top: 10px;
        }

        .slot {
            aspect-ratio: 1 / 1;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfdfd;
            min-width: 0;
        }

        .slot.filled { border-style: solid; border-color: var(--primary); background: white; }

        .pec-card {
            width: 100%; 
            height: 100%; 
            padding: 4px;
            text-align: center; 
            cursor: pointer;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
        }

        .pec-card img { 
            width: 90%; 
            height: 70%; 
            object-fit: contain; 
            margin-top: 2px;
        }

        .card-label { 
            font-size: 0.7rem; 
            font-weight: 800; 
            color: #1e293b; 
            line-height: 1;
            margin-bottom: 2px;
            word-break: break-word;
        }

        .btn-send {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 0 #1d4ed8;
        }

        .btn-send:active { transform: translateY(2px); box-shadow: 0 2px 0 #1d4ed8; }

        /* Category Navigation Styles */
        .category-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .category-nav {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            flex-grow: 1;
        }

        .folder-btn {
            background: var(--folder);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .folder-btn.active { background: #000; }

        .add-folder-btn {
            background: var(--success);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }

        .library-section {
            background: #e2e8f0;
            padding: 15px;
            border-radius: 20px;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
        }

        .lib-card-wrapper { position: relative; aspect-ratio: 1/1; }

        .lib-card {
            background: white;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .lib-card img { width: 80%; height: 70%; object-fit: contain; }

        .del-btn {
            position: absolute;
            top: -5px; right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 22px; height: 22px;
            border: 2px solid white;
            font-size: 14px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10;
        }

        .btn-del-folder {
            background: none;
            border: 1px solid var(--danger);
            color: var(--danger);
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
        }

        .add-custom-btn {
            background: #cbd5e1;
            color: #475569;
            font-weight: bold; font-size: 1.5rem;
            border: 2px dashed #94a3b8;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .grid-6 { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="routine-section">
        <h2 style="font-size: 0.9rem; margin: 0; margin-bottom: 10px;">⏳ Visual Sequence</h2>
        <div id="routineGrid" class="grid-6"></div>
        
        <button class="btn-send" onclick="sendToPartner()">🔗 Create WhatsApp Link</button>
        <button onclick="clearRoutine()" style="background:none; border:none; color:gray; text-decoration:underline; font-size:0.7rem; margin-top:10px; width:100%;">Clear All</button>
    </div>

    <div class="category-container">
        <div id="categoryNav" class="category-nav"></div>
        <button class="add-folder-btn" onclick="addNewCategory()">+</button>
    </div>

    <div class="library-section">
        <div class="library-header">
            <span id="currentCatLabel" style="font-weight: bold; font-size: 0.8rem; color: #475569;">Category</span>
            <button id="delFolderBtn" class="btn-del-folder" onclick="deleteCurrentCategory()">Delete Folder</button>
        </div>
        <div id="libraryGrid" class="library-grid"></div>
    </div>
</div>

<script>
    const SLOT_COUNT = 6;
    const INITIAL_DB = {
        "Time": [
            { id: "t1", label: 'Wait', img: 'https://cdn-icons-png.flaticon.com/512/2997/2997985.png' },
            { id: "t2", label: '5 Mins', img: 'https://cdn-icons-png.flaticon.com/512/3563/3563395.png' }
        ],
        "Social": [
            { id: "s1", label: 'I Love You', img: 'https://cdn-icons-png.flaticon.com/512/833/833472.png' }
        ]
    };

    let database = JSON.parse(localStorage.getItem('pecs_db_final')) || INITIAL_DB;
    // Set initial category to the first one available in the database
    let state = { 
        routine: Array(SLOT_COUNT).fill(null), 
        currentCategory: Object.keys(database)[0] || "" 
    };

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const sharedData = params.get('data');
        if (sharedData) {
            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(sharedData))));
                state.routine = decoded.r;
                database = decoded.db;
                saveDb();
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch(e) { console.error("Link load error"); }
        }
        render();
    };

    function saveDb() {
        localStorage.setItem('pecs_db_final', JSON.stringify(database));
    }

    function render() {
        // Render Sequence
        const routineEl = document.getElementById('routineGrid');
        routineEl.innerHTML = state.routine.map((item, i) => {
            if (!item) return `<div class="slot"></div>`;
            return `<div class="slot filled" onclick="removeFromSlot(${i})">
                <div class="pec-card">
                    <img src="${item.img}">
                    <div class="card-label">${item.label}</div>
                </div>
            </div>`;
        }).join('');

        // Render Category Tabs
        const navEl = document.getElementById('categoryNav');
        const categories = Object.keys(database);
        navEl.innerHTML = categories.map(cat => `
            <button class="folder-btn ${state.currentCategory === cat ? 'active' : ''}" 
                    onclick="setCategory('${cat}')">${cat}</button>
        `).join('');

        // Update Labels
        document.getElementById('currentCatLabel').innerText = state.currentCategory || "No Categories";
        const delBtn = document.getElementById('delFolderBtn');
        delBtn.style.display = categories.length > 0 ? "block" : "none";

        // Render Library Cards
        const libEl = document.getElementById('libraryGrid');
        if (!state.currentCategory || !database[state.currentCategory]) {
            libEl.innerHTML = "";
            return;
        }

        let libHtml = database[state.currentCategory].map((item, index) => `
            <div class="lib-card-wrapper">
                <div class="del-btn" onclick="deleteFromLibrary(${index})">×</div>
                <div class="lib-card" onclick='addToFirstEmptySlot(${JSON.stringify(item)})'>
                    <img src="${item.img}">
                    <div class="card-label">${item.label}</div>
                </div>
            </div>
        `).join('');
        
        libHtml += `<div class="add-custom-btn" onclick="addLinkCard()">+</div>`;
        libEl.innerHTML = libHtml;
    }

    // --- Category Management Functions ---

    function addNewCategory() {
        const name = prompt("Enter new folder name:");
        if (name && name.trim() !== "") {
            if (database[name]) {
                alert("Folder already exists!");
            } else {
                database[name] = []; // Create empty array for new folder
                state.currentCategory = name;
                saveDb();
                render();
            }
        }
    }

    function deleteCurrentCategory() {
        if (confirm(`Delete the entire folder "${state.currentCategory}" and all its cards?`)) {
            delete database[state.currentCategory];
            const remaining = Object.keys(database);
            state.currentCategory = remaining.length > 0 ? remaining[0] : "";
            saveDb();
            render();
        }
    }

    function setCategory(cat) { state.currentCategory = cat; render(); }
    
    function deleteFromLibrary(index) {
        if(confirm("Delete this card?")) {
            database[state.currentCategory].splice(index, 1);
            saveDb();
            render();
        }
    }

    function addLinkCard() {
        const label = prompt("Card Name:");
        const imgUrl = prompt("Paste Image Link:");
        if (label && imgUrl) {
            database[state.currentCategory].push({ id: "cust_" + Date.now(), label, img: imgUrl });
            saveDb();
            render();
        }
    }

    function addToFirstEmptySlot(card) {
        const idx = state.routine.findIndex(s => s === null);
        if (idx !== -1) { state.routine[idx] = card; render(); }
    }
    function removeFromSlot(index) { state.routine[index] = null; render(); }
    function clearRoutine() { state.routine = Array(SLOT_COUNT).fill(null); render(); }

    function sendToPartner() {
        const data = JSON.stringify({ r: state.routine, db: database });
        const encoded = btoa(unescape(encodeURIComponent(data)));
        const shareUrl = window.location.href.split('?')[0] + "?data=" + encoded;
        
        const el = document.createElement("textarea");
        el.value = shareUrl;
        document.body.appendChild(el);
        el.select();
        document.execCommand("copy");
        document.body.removeChild(el);
        alert("WhatsApp link copied!");
    }
</script>
</body>
</html>
